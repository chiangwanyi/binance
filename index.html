<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炒币吗？</title>
    <script src="./js/vue.global.js"></script>
    <script src="./js/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f172a;
            color: #e5e7eb;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ===== 主布局 ===== */
        #app {
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-wrap: wrap;
            /* 小屏幕下允许换行 */
        }

        .left {
            width: 360px;
            min-width: 280px;
            /* 最小宽度保证可用性 */
            max-width: 400px;
            /* 最大宽度限制 */
            background: #020617;
            border-right: 1px solid #1e293b;
            padding: 12px;
            overflow-y: auto;
            flex-shrink: 0;
            /* 防止被挤压 */
        }

        .right {
            flex: 1;
            min-width: 300px;
            /* 最小宽度保证图表可用 */
            position: relative;
            height: 100vh;
        }

        /* ===== 左侧通用 ===== */
        .left h1 {
            margin: 0 0 16px;
            text-align: center;
            font-size: 16px;
            color: #cbd5f5;
        }

        /* 左侧工具按钮组 - 响应式 Flex */
        .tool-group {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            /* 小屏幕换行 */
            justify-content: center;
            /* 居中对齐 */
        }

        .card {
            background: rgba(2, 6, 23, 0.85);
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            width: 100%;
            /* 占满父容器 */
        }

        .card h3 {
            margin: 0 0 10px;
            font-size: 13px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 6px;
            color: #cbd5f5;
        }

        /* ===== 表单 & 输入框 响应式 ===== */
        .form-row {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            flex-wrap: nowrap;
            /* 强制不换行 */
            align-items: flex-end;
            width: 100%;
            /* 占满父容器，不溢出 */
            overflow: hidden;
            /* 防止意外溢出 */
        }

        .form-col {
            flex: 1;
            min-width: 0;
            /* 关键：允许 flex 子项收缩，防止撑破容器 */
            max-width: 100%;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: #94a3b8;
            width: 100%;
        }

        input,
        select {
            background: #0f172a;
            border: 1px solid #1e293b;
            color: #e5e7eb;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 12px;
            width: 100%;
            min-width: 0;
            /* 关键：防止输入框撑破父容器 */
            box-sizing: border-box;
            min-height: 30px;
        }

        /* ===== 按钮 响应式 ===== */
        button {
            background: #334155;
            border: none;
            color: #e5e7eb;
            font-size: 12px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
            /* 防止按钮被挤压 */
            min-width: 60px;
            /* 最小宽度保证点击区域 */
        }

        button:hover {
            background: #475569;
        }

        button.active {
            outline: 1px solid #3b82f6;
        }

        /* 按钮组通用样式 */
        .btn-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            /* 小屏幕换行 */
            margin-bottom: 10px;
        }

        /* 价格线列表项 */
        .price-line-item {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            align-items: center;
            padding: 4px;
            border: 1px solid #1e293b;
            border-radius: 4px;
            width: 100%;
            flex-wrap: wrap;
        }

        .price-line-info {
            flex: 1;
            min-width: 100px;
        }

        .price-line-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }

        /* ===== 图表 & 覆盖层 ===== */
        .right>div:first-child,
        .right svg {
            position: absolute;
            inset: 0;
        }

        .right svg {
            z-index: 20;
        }

        .right>div:last-child {
            position: absolute;
            z-index: 30;
            min-width: 180px;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
            pointer-events: none;
        }

        .right>div:last-child>div>div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        /* ===== 响应式适配小屏幕 ===== */
        @media (max-width: 768px) {
            #app {
                flex-direction: column;
            }

            .left {
                width: 100%;
                max-width: 100%;
                height: 40vh;
                /* 小屏幕下左侧占40%高度 */
                border-right: none;
                border-bottom: 1px solid #1e293b;
            }

            .right {
                width: 100%;
                height: 60vh;
                /* 小屏幕下右侧占60%高度 */
            }

            .form-row {
                flex-direction: column;
                gap: 10px;
            }

            .tool-group {
                justify-content: flex-start;
            }
        }

        @media (max-width: 480px) {
            .left {
                padding: 8px;
            }

            .card {
                padding: 8px;
            }

            button {
                min-width: 50px;
                padding: 4px 6px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- 左侧面板 -->
        <div class="left">
            <h1>币安永续合约</h1>

            <!-- 主题切换 & 分享按钮组 -->
            <div class="tool-group">
                <button @click="setTheme('dark')" :class="{active: theme==='dark'}">🌙 夜间</button>
                <button @click="setTheme('light')" :class="{active: theme==='light'}">☀️ 日间</button>
                <button @click="shareChart()">🔗 分享</button>
            </div>

            <div class="card">
                <h3>绘图工具</h3>

                <label>基础工具</label>
                <div class="btn-group">
                    <button :class="{active: activeTool==='cursor'}" @click="setTool('cursor')">查看K线</button>
                    <button style="color: red" @click="clearAllOverlays">清除图形</button>
                </div>

                <label>趋势线工具</label>
                <div class="btn-group">
                    <button :class="{active: activeTool==='trendline'}" @click="setTool('trendline')">
                        趋势线
                    </button>
                    <button :class="{active: activeTrendColor==='#22c55e'}" style="color:#22c55e"
                        @click="activeTrendColor='#22c55e'">
                        绿色
                    </button>
                    <button :class="{active: activeTrendColor==='#ef4444'}" style="color:#ef4444"
                        @click="activeTrendColor='#ef4444'">
                        红色
                    </button>
                </div>

                <label>盈亏比工具</label>
                <div class="btn-group">
                    <button :class="{active: activeTool==='rr'}" @click="setTool('rr')">风险盈亏比</button>
                    <button :class="{active: activeTool==='mm'}" @click="setTool('mm')">MM</button>
                </div>

                <label>矩形工具（按DEL删除图形）</label>
                <div class="btn-group">
                    <button :class="{active: activeTool==='rect'}" @click="setTool('rect')">矩形</button>
                    <button :class="{active: activeRectColor==='#a7eec0'}" style="color: #a7eec0"
                        @click="activeRectColor = '#a7eec0'">绿色</button>
                    <button :class="{active: activeRectColor==='#f46060'}" style="color: #f46060"
                        @click="activeRectColor = '#f46060'">红色</button>
                    <button :class="{active: activeRectColor==='#efd763'}" style="color: #efd763"
                        @click="activeRectColor = '#efd763'">橙色</button>
                </div>

                <label>文本框工具（E编辑，ESC退出）</label>
                <div class="btn-group">
                    <button :class="{active: activeTool==='textbox'}" @click="setTool('textbox')">文本框</button>

                    <button :class="{active: activeTextColor==='#22c55e'}" style="color:#22c55e"
                        @click="activeTextColor='#22c55e'">绿色</button>

                    <button :class="{active: activeTextColor==='#ef4444'}" style="color:#ef4444"
                        @click="activeTextColor='#ef4444'">红色</button>
                </div>
            </div>

            <div class="card">
                <h3>K线加载</h3>

                <!-- 第一行表单 -->
                <div class="form-row">
                    <div class="form-col">
                        <label>标的
                            <select v-model="symbol">
                                <option value="BTCUSDT">BTCUSDT</option>
                                <option value="ETHUSDT">ETHUSDT</option>
                                <option value="XAUUSDT">XAUUSDT</option>
                                <option value="XAGUSDT">XAGUSDT</option>
                            </select>
                        </label>
                    </div>
                    <div class="form-col">
                        <label>盘面
                            <select v-model="location">
                                <option value="utc8">常规UTC+8</option>
                                <option value="et">美东9:30~16:10</option>
                            </select>
                        </label>
                    </div>
                    <div class="form-col">
                        <label>时间周期
                            <select v-model="interval">
                                <option value="1m">1m</option>
                                <option value="5m">5m</option>
                                <option value="30m">30m</option>
                                <option value="1h">1h</option>
                            </select>
                        </label>
                    </div>
                </div>
                <!-- 起始时间行 -->
                <div class="form-row">
                    <div class="form-col">
                        <label>起始时间
                            <input type="datetime-local" v-model="startTime">
                        </label>
                    </div>
                    <div class="form-col">
                        <button @click="setTimePart('start', 9, 30)">09:30</button>
                    </div>
                </div>
                <!-- 结束时间行 -->
                <div class="form-row">
                    <div class="form-col">
                        <label>结束时间
                            <input type="datetime-local" v-model="endTime">
                        </label>
                    </div>
                    <div class="form-col">
                        <button @click="setTimePart('end', 9, 30)" style="margin-right: 4px;">09:30</button>
                        <button @click="setTimePart('end', 11, 30)">11:30</button>
                        <button @click="setTimePart('end', 12, 30)">12:30</button>
                    </div>
                </div>

                <!-- 加载/刷新按钮组 -->
                <div class="btn-group">
                    <button @click="loadKlineByDateRange(0, 0)" style="background-color: #29c15e;">加载数据</button>
                    <button @click="reDownloadKlineByDateRange()">刷新数据</button>
                    <button @click="runBacktest()">回测策略</button>
                </div>

                <!-- 位移按钮组 -->
                <div class="btn-group">
                    <button @click="loadKlineByDateRange(-1, -1)">起始前移</button>
                    <button @click="loadKlineByDateRange(-1, 1)">起始后移</button>
                    <button @click="loadKlineByDateRange(1, -1)">结束前移</button>
                    <button @click="loadKlineByDateRange(1, 1)">结束后移</button>
                </div>
            </div>

            <div class="card">
                <h3>价格线管理</h3>

                <!-- 添加价格线表单 -->
                <div class="form-row">
                    <div class="form-col">
                        <label>标题
                            <input type="text" v-model="newPriceLine.title" placeholder="例如：压力位、支撑位">
                        </label>
                    </div>
                    <div class="form-col">
                        <label>价格
                            <input type="number" step="0.1" v-model="newPriceLine.price" placeholder="点击图表自动填充或手动输入">
                        </label>
                    </div>
                </div>

                <div class="form-row" style="margin-bottom: 8px;">
                    <input type="color" v-model="newPriceLine.color" value="#a7eec0" style="min-height: 30px;">
                    <button @click="this.addPriceLine">添加价格线</button>
                </div>

                <div class="btn-group">
                    <button style="color: #a7eec0"
                        @click="newPriceLine.color = '#a7eec0';this.addPriceLine();">绿色</button>
                    <button style="color: #f46060"
                        @click="newPriceLine.color = '#f46060';this.addPriceLine();">红色</button>
                </div>

                <!-- 已添加价格线列表 -->
                <div style="margin-top: 12px; max-height: 200px; overflow-y: auto;">
                    <div v-for="(line, index) in priceLines" :key="index" class="price-line-item">
                        <div class="price-line-info">
                            <div style="font-size: 11px; color: #94a3b8;">{{ line.title }}</div>
                            <div style="font-size: 11px;">{{ line.price }} <span :style="{color: line.color}">■</span>
                            </div>
                        </div>
                        <div class="price-line-actions">
                            <button @click="this.togglePriceLineVisible(index)" :title="line.visible ? '隐藏' : '显示'">
                                {{ line.visible ? '隐藏' : '显示' }}
                            </button>
                            <button @click="this.editPriceLine(index)">编辑</button>
                            <button @click="this.deletePriceLine(index)" style="background: #ef4444;">删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧图表 -->
        <div class="right" ref="chartWrapper">
            <!-- 图表容器 -->
            <div ref="chartEl"></div>

            <!-- SVG Overlay -->
            <svg ref="overlayEl" :style="{pointerEvents: activeTool==='cursor'?'none':'auto'}"
                @pointerdown="onOverlayPointerDown" @pointermove="onOverlayPointerMove" @pointerup="onOverlayPointerUp">
            </svg>

            <!-- Tooltip -->
            <div ref="tooltipEl"
                :style="{top: tooltipPos.top+'px', left: tooltipPos.left+'px', opacity: tooltipPos.opacity}">
                <div v-if="currentKline">
                    <div><span>时间(UTC+8)</span><b>{{ formatTimestamp(currentKline["openTime"]) }}</b></div>
                    <div><span>开盘</span><b>{{ currentKline["openPrice"] }}</b></div>
                    <div><span>最高</span><b>{{ currentKline["highPrice"] }}</b></div>
                    <div><span>最低</span><b>{{ currentKline["lowPrice"] }}</b></div>
                    <div>
                        <span>收盘</span>
                        <b
                            :style='{color: currentKline["closePrice"] >= currentKline["openPrice"] ? "#22c55e" : "#ef4444"}'>
                            {{ currentKline["closePrice"] }}
                        </b>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'BTCUSDT_5M_KLINE_TIME_RANGE';
        const {createApp} = Vue

        createApp({
            data() {
                return {
                    // 图表核心实例
                    chart: null,
                    candleSeries: null,

                    theme: localStorage.getItem('chart_theme') || 'dark',

                    symbol: 'BTCUSDT',

                    // 日期
                    startTime: '2025-01-01T00:00',
                    endTime: '2025-01-01T12:00',
                    interval: '5m',
                    location: 'utc8',

                    // 业务数据
                    step: 5,
                    isLoading: false,      // 加载状态
                    operateMsg: '',        // 操作提示信息
                    operateSuccess: false, // 操作是否成功
                    currentKlineData: [],  // 当前K线数据
                    currentKline: null,    // 悬浮的当前K线
                    tooltipPos: {          // 悬浮提示位置
                        top: 0,
                        left: 0,
                        opacity: 0
                    },

                    // 绘图相关
                    overlayDragging: false,
                    overlayTempPoint: null,
                    trendLines: [],        // 趋势线数据
                    activeTrendColor: '#22c55e',

                    activeTool: 'cursor',  // cursor | trendline | rect | rr
                    rects: [],             // 矩形数据
                    activeRectColor: '#a7eec0',
                    rectTemp: null,        // 临时矩形数据
                    rrTools: [],           // 盈亏比工具数据
                    rrTemp: null,          // 临时盈亏比数据
                    mmTools: [],           // Measured Move 工具数据
                    mmTemp: null,          // 临时Measured Move 数据
                    currentMouseX: 0,      // 当前鼠标X坐标
                    currentMouseY: 0,      // 当前鼠标Y坐标

                    // 指标线
                    ema20Series: null,

                    // 价格线相关
                    newPriceLine: { // 新增价格线的临时数据
                        title: '',
                        price: '',
                        color: '#a7eec0'
                    },
                    priceLinesData: [],
                    priceLines: [], // 已添加的价格线列表，每项结构：{title, price, color, visible, series}
                    editingPriceLineIndex: -1, // 正在编辑的价格线索引（-1表示未编辑）

                    // ===== 文本框工具 =====
                    textBoxes: [],        // 已创建文本框
                    textBoxTemp: null,    // 临时文本框
                    activeTextColor: '#22c55e',
                    editingTextBoxIndex: -1,
                    isEditingText: false,

                    // ===== 回测相关  =====
                    yesterdayHighestPrice: 0,   // 昨日最高价
                    yesterdayLowestPrice: 0,    // 昨日最低价
                    todayFirstKHighPrice: 0,    // 今日#1K线最高价
                    todayFirstKLowPrice: 0,     // 今日#1K线最低价

                    // API基础地址
                    apiBaseUrl: 'http://localhost:8765'
                };
            },
            mounted() {
                // === 0. 优先从 URL 参数恢复 ===
                const params = new URLSearchParams(window.location.search);
                const sid = params.get('sid');
                const links = params.get('links');

                if (sid) {
                    fetch(`${this.apiBaseUrl}/api/chart/${sid}`)
                        .then(res => res.json())
                        .then(data => {
                            let value = JSON.parse(data.data.content);
                            this.symbol = value.symbol;
                            this.startTime = value.startTime;
                            this.endTime = value.endTime;
                            this.interval = value.interval;
                            this.location = value.location;

                            this.trendLines = value.trendLines || [];
                            this.rects = value.rects || [];
                            this.rrTools = value.rrTools || [];
                            this.mmTools = value.mmTools || [];
                            this.textBoxes = value.textBoxes || [];
                            this.priceLinesData = value.priceLines || []; // ✅ 只保存纯数据

                            this.saveCache();
                            this.$nextTick(() => {
                                this.renderOverlay();
                            });
                        });
                } else if (links) {
                    const [symbol, startTime, endTime, interval, location, stopLossP, openP, r1, r2] = links.split('|');
                    this.symbol = symbol;
                    this.startTime = startTime;
                    this.endTime = endTime;
                    this.interval = interval;
                    this.location = location;
                    console.log(symbol, startTime, endTime, interval, location, stopLossP, openP, r1, r2);
                    

                    setTimeout(() => {
                        this.loadKlineByDateRange(0, 0)
                        setTimeout(() => {
                            this.addPriceLineV2("止损", stopLossP, "red")
                            this.addPriceLineV2("开仓", openP, "blue")
                            this.addPriceLineV2("R1", r1, "yellow")
                            this.addPriceLineV2("R2", r2, "pink")
                        }, 300);
                    }, 1000);
                    this.saveCache();
                    this.$nextTick(() => {
                        this.renderOverlay();
                    });
                } else {
                    // === 1. 从浏览器缓存中恢复时间 ===
                    const cache = localStorage.getItem(STORAGE_KEY);
                    if (cache) {
                        try {
                            const {startTime, endTime, interval, location, symbol} = JSON.parse(cache);
                            if (startTime) this.startTime = startTime;
                            if (endTime) this.endTime = endTime;
                            if (interval) this.interval = interval;
                            if (location) this.location = location;
                            if (symbol) this.symbol = symbol;

                        } catch (e) {
                            console.warn('时间缓存解析失败，已忽略');
                        }
                    }
                }
                // 初始化图表
                this.initChart();
                this.applyTheme();
                // 初始化十字光标监听
                this.initCrosshairListener();
                // 窗口大小监听
                window.addEventListener('resize', this.handleWindowResize);
                window.addEventListener('keydown', this.handleKeyDown);
                // 初始化Overlay
                this.initOverlay();

            },
            unmounted() {
                window.removeEventListener('resize', this.handleWindowResize);
                // 移除overlay的resize监听
                window.removeEventListener('resize', this.resizeOverlay);
                window.removeEventListener('keydown', this.handleKeyDown);
                // 移除图表监听
                if (this.chart) {
                    this.chart.timeScale().unsubscribeVisibleTimeRangeChange(this.renderOverlay);
                    this.chart.unsubscribeCrosshairMove(this.renderOverlay);
                }
            },
            watch: {
                startTime() {
                    this.saveCache();
                },
                endTime() {
                    this.saveCache();
                },
                interval() {
                    this.saveCache();
                },
                location() {
                    this.saveCache();
                },
                symbol() {
                    this.saveCache();
                }
            },
            methods: {
                addTrendLine(startTime, startPrice, endTime, endPrice, color) {
                    this.trendLines.push({
                        t1: startTime / 1000,
                        p1: startPrice,
                        t2: endTime / 1000,
                        p2: endPrice,
                        color: color
                    });
                    this.renderOverlay();
                },
                addPriceLineV2(title, price, color) {
                    // 新增价格线
                    const lineSeries = this.chart.addSeries(LightweightCharts.LineSeries, {
                        color: color,
                        lineWidth: 2,
                        crosshairMarkerVisible: false,
                        title: title
                    });
                    // 构造价格线数据（横向线需要相同价格的首尾数据）
                    let p = Number(price)
                    const priceLineData = this.buildPriceLineData(p);
                    lineSeries.setData(priceLineData);
                    this.priceLines.push({
                        price: p,
                        color: color,
                        visible: true,
                        series: lineSeries
                    });
                },
                /**
                 * K线形态识别（按你指定的大阳/大阴规则）
                 * @param {Object} kData - { open, high, low, close, time }
                 * @returns {string} 形态名称
                 */
                getKlineShape(kData) {
                    const {open, high, low, close} = kData;

                    // 1. 基础计算
                    const totalHeight = high - low;
                    const bodyHeight = Math.abs(close - open);
                    const isUp = close > open;    // 阳线
                    const isDown = close < open;  // 阴线
                    const isDojiLine = totalHeight === 0; // 一字线

                    // 极端情况：一字板
                    if (isDojiLine) {
                        return '一字线';
                    }

                    // 实体占比（整数）
                    const bodyRatio = Math.round((bodyHeight / totalHeight) * 100);

                    // 影线长度
                    const upperWick = high - Math.max(open, close);
                    const lowerWick = Math.min(open, close) - low;

                    // 判断：是否没有影线（上下影线都极短，视为无）
                    const noUpperWick = upperWick <= totalHeight * 0.02;
                    const noLowerWick = lowerWick <= totalHeight * 0.02;
                    const noWicks = noUpperWick && noLowerWick;

                    // 2. 形态判断
                    // ✅ 十字星
                    if (bodyRatio <= 20) {
                        if (isUp) return '阳线十字星';
                        if (isDown) return '阴线十字星';
                        return '十字星';
                    }

                    // ✅ 长上影线
                    if (upperWick / totalHeight >= 0.6) {
                        return isUp ? '长上影线阳线' : '长上影线阴线';
                    }

                    // ✅ 长下影线
                    if (lowerWick / totalHeight >= 0.6) {
                        return isUp ? '长下影线阳线' : '长下影线阴线';
                    }

                    // ======================
                    // 你要求的 大阳/大阴 规则
                    // ======================
                    const isBigCandle =
                        (noWicks && bodyRatio >= 70) ||  // 无上下影 + 实体≥70%
                        bodyRatio >= 90;                 // 或者 实体≥90%（直接大K线）

                    if (isBigCandle) {
                        return isUp ? '大阳线' : '大阴线';
                    }

                    // ✅ 普通阳线/阴线
                    return isUp ? '阳线' : '阴线';
                },
                getCandleBodyRatio(kData) {
                    // 解构数据（和你提供的格式完全匹配）
                    const {open, high, low, close} = kData;

                    // 1. 计算K线总高度（最高价 - 最低价）
                    const totalHeight = high - low;

                    // 2. 计算实体高度（绝对值，不分涨跌）
                    const bodyHeight = Math.abs(close - open);

                    // 3. 边界处理：防止除以0（一字板K线）
                    if (totalHeight === 0) {
                        return 0.00;
                    }

                    // 4. 计算占比，保留整数
                    return Math.round((bodyHeight / totalHeight) * 100);
                },
                isUpCandle(k) {
                    return k.close > k.open;
                },
                isDownCandle(k) {
                    return k.close < k.open;
                },
                printKDataInfo(k) {
                    return `【open: ${k.open}, close: ${k.close}, high: ${k.high}, low: ${k.low}】`;
                },
                runBacktest() {
                    const data = this.currentKlineData;
                    // if (!data || data.length < 81) {
                    //     console.log("数据不够")
                    //     return;
                    // }
                    // === 转换数据格式 ===
                    const candles = data.map(k => ({
                        open: parseFloat(k.openPrice),
                        high: parseFloat(k.highPrice),
                        low: parseFloat(k.lowPrice),
                        close: parseFloat(k.closePrice),
                        time: k.openTime
                    }));
                    this.yesterdayHighestPrice = -1;
                    this.yesterdayLowestPrice = 99999999;
                    for (let i = 1; i <= candles.length; i++) {

                        if (i < 82) {
                            this.yesterdayHighestPrice = Math.max(this.yesterdayHighestPrice, ck.high);
                            this.yesterdayLowestPrice = Math.min(this.yesterdayLowestPrice, ck.low);

                        if (i === 81) {

                            this.addPriceLineV2("昨日最低价", this.yesterdayLowestPrice, "red")
                            console.log(`昨天最高价：${this.yesterdayHighestPrice}，昨日最低价：${this.yesterdayLowestPrice}`)
                        }
                        if (i >= 82) {
                            // 今天的#1 k线
                            if (i === 82) {
                                this.todayFirstKHighPrice = ck.high;
                                this.todayFirstKLowPrice = ck.low;
                                console.log(`今日#${i - 82 + 1}：收${this.getKlineShape(ck)}，实体部分占比${this.getCandleBodyRatio(ck)}%，${this.printKDataInfo(ck)}`)
                            } else {
                                console.log(`今日#${i - 82 + 1}：收${this.getKlineShape(ck)}，实体部分占比${this.getCandleBodyRatio(ck)}%，${this.printKDataInfo(ck)}`)
                            }
                        }

                    }
                },
                /**
                 * 设置时间的时分部分
                 * @param {string} type - 类型：start（起始时间）/ end（结束时间）
                 * @param {number} hour - 小时（0-23）
                 * @param {number} minute - 分钟（0-59）
                 */
                setTimePart(type, hour, minute) {
                    // 确定要修改的时间字段
                    const timeKey = type === 'start' ? 'startTime' : 'endTime';
                    // 获取当前时间值（如：2025-01-01T00:00）
                    let currentTime = this[timeKey];
                    if (!currentTime) return;

                    // 拆分日期和时间部分
                    const [datePart, timePart] = currentTime.split('T');
                    // 格式化时分（补零，确保两位）
                    const formattedHour = hour.toString().padStart(2, '0');
                    const formattedMinute = minute.toString().padStart(2, '0');
                    // 拼接新的时间字符串
                    const newTime = `${datePart}T${formattedHour}:${formattedMinute}`;

                    // 更新绑定的时间值
                    this[timeKey] = newTime;
                    // 同步更新缓存
                    this.saveCache();
                },
                handleKeyDown(e) {
                    // ===== E编辑文本 =====
                    if (e.key === 'e' || e.key === 'E') {
                        const time = this.chart.timeScale().coordinateToTime(this.currentMouseX);
                        const price = this.candleSeries.coordinateToPrice(this.currentMouseY);
                        for (let i = 0; i < this.textBoxes.length; i++) {
                            const tb = this.textBoxes[i];
                            const minT = Math.min(tb.t1, tb.t2);
                            const maxT = Math.max(tb.t1, tb.t2);
                            const minP = Math.min(tb.p1, tb.p2);
                            const maxP = Math.max(tb.p1, tb.p2);
                            if (time >= minT && time <= maxT && price >= minP && price <= maxP) {
                                const txt = prompt("编辑文本", tb.text);
                                if (txt !== null) {
                                    tb.text = txt;
                                }
                                this.activeTool = 'cursor';
                                this.renderOverlay();
                                return;
                            }
                        }
                    } else if (e.key === 'Delete') {
                        this.deleteShapeUnderCursor();
                    }
                },
                pointToSegmentDistance(px, py, x1, y1, x2, y2) {

                    const dx = x2 - x1;
                    const dy = y2 - y1;

                    if (dx === 0 && dy === 0) {
                        return Math.hypot(px - x1, py - y1);
                    }

                    const t = (
                        (px - x1) * dx +
                        (py - y1) * dy
                    ) / (dx * dx + dy * dy);

                    const clampedT = Math.max(0, Math.min(1, t));

                    const projX = x1 + clampedT * dx;
                    const projY = y1 + clampedT * dy;

                    return Math.hypot(px - projX, py - projY);
                },
                deleteShapeUnderCursor() {

                    const time = this.chart.timeScale().coordinateToTime(this.currentMouseX);
                    const price = this.candleSeries.coordinateToPrice(this.currentMouseY);

                    if (!time || price == null) return;

                    const thresholdPrice = 0.002 * price;   // 价格容忍
                    const thresholdTime = 60 * 5;           // 时间容忍(5分钟)

                    if (this.activeTool === 'trendline') {
                        // ===== 删除趋势线（鼠标到线段最短距离）=====
                        const mouseX = this.currentMouseX;
                        const mouseY = this.currentMouseY;
                        let minDist = Infinity;
                        let deleteIndex = -1;
                        for (let i = 0; i < this.trendLines.length; i++) {
                            const line = this.trendLines[i];
                            // 转换为屏幕坐标
                            const x1 = this.chart.timeScale().timeToCoordinate(line.t1);
                            const y1 = this.candleSeries.priceToCoordinate(line.p1);
                            const x2 = this.chart.timeScale().timeToCoordinate(line.t2);
                            const y2 = this.candleSeries.priceToCoordinate(line.p2);
                            if (x1 == null || x2 == null || y1 == null || y2 == null) continue;
                            const dist = this.pointToSegmentDistance(
                                mouseX, mouseY,
                                x1, y1,
                                x2, y2
                            );
                            if (dist < minDist) {
                                minDist = dist;
                                deleteIndex = i;
                            }
                        }
                        // 最大允许距离（像素）
                        const MAX_DISTANCE = 10;
                        if (deleteIndex !== -1 && minDist < MAX_DISTANCE) {
                            this.trendLines.splice(deleteIndex, 1);
                            this.renderOverlay();
                        }
                    }

                    if (this.activeTool === 'rect') {
                        // ===== 2 删除矩形 =====
                        for (let i = 0; i < this.rects.length; i++) {
                            const r = this.rects[i];
                            const minT = Math.min(r.t1, r.t2);
                            const maxT = Math.max(r.t1, r.t2);
                            const minP = Math.min(r.p1, r.p2);
                            const maxP = Math.max(r.p1, r.p2);
                            if (time >= minT && time <= maxT && price >= minP && price <= maxP) {
                                this.rects.splice(i, 1);
                                this.renderOverlay();
                                return;
                            }
                        }
                    }

                    if (this.activeTool === 'textbox') {
                        for (let i = 0; i < this.textBoxes.length; i++) {
                            const r = this.textBoxes[i];
                            const minT = Math.min(r.t1, r.t2);
                            const maxT = Math.max(r.t1, r.t2);
                            const minP = Math.min(r.p1, r.p2);
                            const maxP = Math.max(r.p1, r.p2);
                            if (time >= minT && time <= maxT && price >= minP && price <= maxP) {
                                this.textBoxes.splice(i, 1);
                                this.renderOverlay();
                                return;
                            }
                        }
                    }

                    if (this.activeTool === 'rr') {
                        // ===== 3 删除 RR 工具 =====
                        for (let i = 0; i < this.rrTools.length; i++) {
                            const rr = this.rrTools[i];
                            if (
                                Math.abs(rr.entryTime - time) < thresholdTime &&
                                Math.abs(rr.entryPrice - price) < thresholdPrice
                            ) {
                                this.rrTools.splice(i, 1);
                                this.renderOverlay();
                                return;
                            }
                        }
                    }

                    if (this.activeTool === 'mm') {
                        // ===== 4 删除 MM 工具 =====
                        for (let i = 0; i < this.mmTools.length; i++) {

                            const mm = this.mmTools[i];
                            if (
                                Math.abs(mm.entryTime - time) < thresholdTime &&
                                Math.abs(mm.entryPrice - price) < thresholdPrice
                            ) {
                                this.mmTools.splice(i, 1);
                                this.renderOverlay();
                                return;
                            }
                        }
                    }
                },

                initChart() {

                calculateEMA(data, period = 20) {
                    const k = 2 / (period + 1);
                    let ema = null;

                    return data.map((item, index) => {
                        const close = item.close;
                        if (ema === null) {
                            ema = close; // 第一根
                        } else {
                            ema = close * k + ema * (1 - k);
                        }
                        return {
                            time: item.time,
                            value: Number(ema.toFixed(4))
                        };
                    });
                },
                // 添加价格线
                addPriceLine() {
                    if (!this.newPriceLine.price) {
                        window.alert('名称和价格不能为空');
                        return;
                    }
                    // 判断是否为编辑状态
                    if (this.editingPriceLineIndex > -1) {
                        const editLine = this.priceLines[this.editingPriceLineIndex];
                        // 更新已有价格线的属性
                        editLine.title = this.newPriceLine.title;
                        editLine.price = this.newPriceLine.price;
                        editLine.color = this.newPriceLine.color;
                        // 更新图表中的价格线样式和数据
                        editLine.series.applyOptions({
                            color: editLine.color,
                            // title: editLine.title
                        });
                        this.updatePriceLineData(editLine);
                        this.editingPriceLineIndex = -1;
                        this.showOperateMsg('价格线编辑成功', true);
                    } else {
                        // 新增价格线
                        const lineSeries = this.chart.addSeries(LightweightCharts.LineSeries, {
                            color: this.newPriceLine.color,
                            lineWidth: 2,
                            crosshairMarkerVisible: false,
                            // title: this.newPriceLine.title,
                        });
                        // 构造价格线数据（横向线需要相同价格的首尾数据）
                        const priceLineData = this.buildPriceLineData(Number(this.newPriceLine.price));
                        lineSeries.setData(priceLineData);

                        this.priceLines.push({
                            // title: this.newPriceLine.title,
                            price: Number(this.newPriceLine.price),
                            color: this.newPriceLine.color,
                            visible: true,
                            series: lineSeries
                        });
                        this.showOperateMsg('价格线添加成功', true);
                    }
                    // 重置新增表单
                    this.newPriceLine = {title: '', price: '', color: '#a7eec0'};
                },

                // 构建价格线数据（横向线）
                buildPriceLineData(price) {
                    const timeScale = this.chart.timeScale();
                    // 正确获取可视区间的时间范围（返回 {from: 开始时间戳, to: 结束时间戳}）
                    const visibleTimeRange = timeScale.getVisibleRange();
                    if (!visibleTimeRange) return [];

                    // 返回横向线数据（首尾两点确定一条横线）
                    return [
                        {time: visibleTimeRange.from, value: price},
                        {time: visibleTimeRange.to, value: price}
                    ];
                },

                // 更新价格线数据（适配视图变化）
                updatePriceLineData(line) {
                    if (!line.visible) return;
                    const priceLineData = this.buildPriceLineData(Number(line.price));
                    line.series.setData(priceLineData);
                },

                // 切换价格线显示/隐藏
                togglePriceLineVisible(index) {
                    const line = this.priceLines[index];
                    line.visible = !line.visible;
                    line.series.applyOptions({visible: line.visible});
                },

                // 编辑价格线
                editPriceLine(index) {
                    const line = this.priceLines[index];
                    this.newPriceLine = {
                        title: line.title,
                        price: line.price,
                        color: line.color
                    };
                    this.editingPriceLineIndex = index;
                },

                // 删除价格线
                deletePriceLine(index) {
                    const line = this.priceLines[index];
                    // 从图表中移除系列
                    this.chart.removeSeries(line.series);
                    // 从列表中删除
                    this.priceLines.splice(index, 1);
                    this.showOperateMsg('价格线已删除', true);
                    this.editingPriceLineIndex = -1;
                },
                /**
                 * 初始化Overlay
                 */
                initOverlay() {
                    this.resizeOverlay();
                    // 确保只绑定一次resize事件
                    window.removeEventListener('resize', this.resizeOverlay);
                    window.addEventListener('resize', this.resizeOverlay);

                    // 图表变化时重绘
                    this.chart.timeScale().subscribeVisibleTimeRangeChange(this.renderOverlay);
                    this.chart.subscribeCrosshairMove(this.renderOverlay);
                },
                clearAllOverlays() {
                    this.trendLines = [];
                    this.rects = [];
                    this.rrTools = [];
                    this.mmTools = [];
                    this.textBoxes = [];

                    this.overlayTempPoint = null;
                    this.rectTemp = null;
                    this.rrTemp = null;
                    this.mmTemp = null;

                    this.renderOverlay();
                    this.showOperateMsg('已清除所有绘图元素', true);
                    // this.updateUrlParams();
                },
                /**
                 * 调整Overlay大小
                 */
                resizeOverlay() {
                    const el = this.$refs.overlayEl;
                    const wrapper = this.$refs.chartWrapper;
                    if (!el || !wrapper) return;

                    el.setAttribute('width', wrapper.clientWidth);
                    el.setAttribute('height', wrapper.clientHeight);

                    this.renderOverlay();
                },
                /**
                 * 渲染所有绘图元素
                 */
                renderOverlay() {
                    const svg = this.$refs.overlayEl;
                    if (!svg || !this.chart || !this.candleSeries) return;
                    // 清空现有内容
                    svg.innerHTML = '';

                    // 渲染趋势线
                    this.renderTrendLines(svg);
                    // 渲染矩形
                    this.renderRects(svg);
                    // 渲染文本框
                    this.renderTextBoxes(svg);
                    // 渲染盈亏比工具
                    this.renderRRTools(svg);
                    // 渲染MM工具
                    this.renderMMTools(svg);
                    // 渲染临时绘制的元素
                    this.renderTempElements(svg);
                    // // 渲染 K 线序号（Bar Count）
                    this.renderBarCount(svg);
                },
                renderTextBoxes(svg) {

                    this.textBoxes.forEach((tb, index) => {

                        const x1 = this.chart.timeScale().timeToCoordinate(tb.t1);
                        const x2 = this.chart.timeScale().timeToCoordinate(tb.t2);
                        const y1 = this.candleSeries.priceToCoordinate(tb.p1);
                        const y2 = this.candleSeries.priceToCoordinate(tb.p2);

                        if (x1 == null || x2 == null || y1 == null || y2 == null) return;

                        const rx = Math.min(x1, x2);
                        const ry = Math.min(y1, y2);
                        const w = Math.abs(x2 - x1);
                        const h = Math.abs(y2 - y1);

                    svg.appendChild(fillRect);

                    // 2. 绘制上边框（虚线）
                    const topLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    topLine.setAttribute('x1', rx);
                    topLine.setAttribute('y1', ry);
                    topLine.setAttribute('x2', rx + width);
                    topLine.setAttribute('y2', ry);
                    topLine.setAttribute('stroke', color);
                    topLine.setAttribute('stroke-width', '1');
                    topLine.setAttribute('stroke-opacity', '0.8');
                    svg.appendChild(topLine);

                    // 3. 绘制下边框（虚线）
                    const bottomLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    bottomLine.setAttribute('x1', rx);
                    bottomLine.setAttribute('y1', ry + height);
                    bottomLine.setAttribute('x2', rx + width);
                    bottomLine.setAttribute('y2', ry + height);
                    bottomLine.setAttribute('stroke', color);
                    bottomLine.setAttribute('stroke-width', '1');
                    bottomLine.setAttribute('stroke-opacity', '0.8');
                    svg.appendChild(bottomLine);

                    // 注意：不绘制左右边框，实现去掉左右边框的效果
                },
                /**
                 * Overlay指针按下事件
                 */
                onOverlayPointerDown(e) {
                    this.currentMouseX = e.offsetX;
                    this.currentMouseY = e.offsetY;

                    if (this.activeTool === 'trendline') {
                        this.handleTrendlineDown(e);
                    } else if (this.activeTool === 'rect') {
                        this.handleRectDown(e);
                    } else if (this.activeTool === 'rr') {
                        this.handleRRDown(e);
                    } else if (this.activeTool === 'mm') {
                        this.handleMMDown(e);
                    } else if (this.activeTool === 'textbox') {
                        const time = this.chart.timeScale().coordinateToTime(e.offsetX);
                        const price = this.candleSeries.coordinateToPrice(e.offsetY);
                        if (!time || price == null) return;
                        this.overlayDragging = true;
                        this.textBoxTemp = {
                            t1: time,
                            p1: price,
                            t2: time,
                            p2: price
                        };
                    }
                },
                /**
                 * Overlay指针移动事件
                 */
                onOverlayPointerMove(e) {
                    // 记录当前鼠标位置
                    this.currentMouseX = e.offsetX;
                    this.currentMouseY = e.offsetY;

                    if (this.activeTool === 'trendline' && this.overlayTempPoint) {
                        this.renderOverlay();
                    } else if (this.activeTool === 'rect' && this.rectTemp) {
                        const t = this.chart.timeScale().coordinateToTime(e.offsetX);
                        const p = this.candleSeries.coordinateToPrice(e.offsetY);
                        if (!t || p == null) return;
                        this.rectTemp.t2 = t;
                        this.rectTemp.p2 = p;
                        this.renderOverlay();
                    } else if (this.activeTool === 'rr' && this.rrTemp) {
                        // 增加空值检查
                        if (!this.rrTemp) return;

                        const t = this.chart.timeScale().coordinateToTime(e.offsetX);
                        const p = this.candleSeries.coordinateToPrice(e.offsetY);
                        if (!t || p == null) return;
                        this.rrTemp.stopTime = t;
                        this.rrTemp.stopPrice = p;
                        this.renderOverlay();
                    } else if (this.activeTool === 'mm' && this.mmTemp) {
                        // 增加空值检查
                        if (!this.mmTemp) return;

                        const t = this.chart.timeScale().coordinateToTime(e.offsetX);
                        const p = this.candleSeries.coordinateToPrice(e.offsetY);
                        if (!t || p == null) return;
                        this.mmTemp.stopTime = t;
                        this.mmTemp.stopPrice = p;
                        this.renderOverlay();
                    } else if (this.overlayDragging && this.activeTool === 'textbox') {
                        const time = this.chart.timeScale().coordinateToTime(e.offsetX);
                        const price = this.candleSeries.coordinateToPrice(e.offsetY);
                        if (!time || price == null) return;
                        this.textBoxTemp.t2 = time;
                        this.textBoxTemp.p2 = price;
                        this.renderOverlay();
                    }
                },
                /**
                 * Overlay指针抬起事件
                 */
                onOverlayPointerUp(e) {
                    if (this.activeTool === 'rect' && this.rectTemp) {
                        // 确保矩形有实际大小
                        if (this.rectTemp.t1 !== this.rectTemp.t2 && this.rectTemp.p1 !== this.rectTemp.p2) {
                            this.rectTemp.color = this.activeRectColor;
                            this.rects.push({...this.rectTemp});
                        }
                        this.rectTemp = null;
                        this.renderOverlay();
                    } else if (this.activeTool === 'rr' && this.rrTemp) {
                        // 增加空值检查
                        if (!this.rrTemp || !this.rrTemp.entryTime || !this.rrTemp.entryPrice) {
                            this.rrTemp = null;
                            return;
                        }

                        // 确保盈亏比矩形有实际大小
                        if (this.rrTemp.entryTime !== this.rrTemp.stopTime &&
                            Math.abs(this.rrTemp.entryPrice - this.rrTemp.stopPrice) > 0) {
                            this.rrTools.push({...this.rrTemp});
                            this.showOperateMsg('盈亏比工具绘制完成，已自动生成1/2/3倍目标位', true);
                        }
                        this.rrTemp = null;
                        this.renderOverlay();
                    } else if (this.activeTool === 'mm' && this.mmTemp) {
                        // 增加空值检查
                        if (!this.mmTemp || !this.mmTemp.entryTime || !this.mmTemp.entryPrice) {
                            this.mmTemp = null;
                            return;
                        }

                        // 确保盈亏比矩形有实际大小
                        if (this.mmTemp.entryTime !== this.mmTemp.stopTime &&
                            Math.abs(this.mmTemp.entryPrice - this.mmTemp.stopPrice) > 0) {
                            this.mmTools.push({...this.mmTemp});
                            this.showOperateMsg('盈亏比工具绘制完成，已自动生成1/2/3倍目标位', true);
                        }
                        this.mmTemp = null;
                        this.renderOverlay();
                    } else if (this.overlayDragging && this.activeTool === 'textbox') {
                        this.textBoxes.push({
                            ...this.textBoxTemp,
                            text: "请输入文本",
                            color: this.activeTextColor
                        });
                        this.textBoxTemp = null;
                        this.overlayDragging = false;
                        this.renderOverlay();
                    }
                },
                /**
                 * 处理趋势线按下事件
                 */
                handleTrendlineDown(e) {
                    const time = this.chart.timeScale().coordinateToTime(e.offsetX);
                    const price = this.candleSeries.coordinateToPrice(e.offsetY);
                    if (!time || price == null) return;

                    if (!this.overlayTempPoint) {
                        // 第一个点
                        this.overlayTempPoint = {t: time, p: price};
                    } else {
                        // 第二个点，完成趋势线绘制
                        this.trendLines.push({
                            t1: this.overlayTempPoint.t,
                            p1: this.overlayTempPoint.p,
                            t2: time,
                            p2: price,
                            color: this.activeTrendColor
                        });
                        this.overlayTempPoint = null;
                        this.renderOverlay();
                    }
                },
                /**
                 * 处理矩形按下事件
                 */
                handleRectDown(e) {
                    const t = this.chart.timeScale().coordinateToTime(e.offsetX);
                    const p = this.candleSeries.coordinateToPrice(e.offsetY);
                    if (!t || p == null) return;
                    this.rectTemp = {t1: t, p1: p, t2: t, p2: p};
                },
                /**
                 * 处理盈亏比按下事件
                 */
                handleRRDown(e) {
                    const t = this.chart.timeScale().coordinateToTime(e.offsetX);
                    const p = this.candleSeries.coordinateToPrice(e.offsetY);
                    if (!t || p == null) return;

                    // 初始化盈亏比临时数据（入场点）
                    this.rrTemp = {
                        entryTime: t,
                        entryPrice: p,
                        stopTime: t,
                        stopPrice: p
                    };
                    this.showOperateMsg('已设置入场点，请拖拽至止损位', true);
                },
                handleMMDown(e) {
                    const t = this.chart.timeScale().coordinateToTime(e.offsetX);
                    const p = this.candleSeries.coordinateToPrice(e.offsetY);
                    if (!t || p == null) return;

                    // 初始化MM临时数据（入场点）
                    this.mmTemp = {
                        entryTime: t,
                        entryPrice: p,
                        stopTime: t,
                        stopPrice: p
                    };
                },
                /**
                 * 初始化十字光标监听（悬浮提示）
                 */
                initCrosshairListener() {
                    if (!this.chart || !this.candleSeries) return;

                    this.chart.subscribeCrosshairMove((param) => {
                        const point = param.point;
                        if (!point || !param.time) {
                            this.currentKline = null;
                            this.tooltipPos.opacity = 0;
                            return;
                        }
                        // 匹配当前K线数据
                        const currentKline = this.currentKlineData.find(k => k["openTime"] === param.time * 1000);
                        if (!currentKline) {
                            this.currentKline = null;
                            this.tooltipPos.opacity = 0;
                            return;
                        }
                        this.currentKline = currentKline;

                        // 计算提示框位置（边界处理）
                        const chartRect = this.$refs.chartEl.getBoundingClientRect();
                        const tooltipEl = this.$refs.tooltipEl;
                        const tooltipWidth = tooltipEl.offsetWidth || 180;
                        const tooltipHeight = tooltipEl.offsetHeight || 100;

                        let left = point.x + 10;
                        let top = point.y + 5;

                        const maxLeft = chartRect.width - tooltipWidth - 10;
                        const maxTop = chartRect.height - tooltipHeight - 10;
                        left = Math.min(left, maxLeft);
                        left = Math.max(left, 10);
                        top = Math.min(top, maxTop);
                        top = Math.max(top, 10);

                        // 更新提示框位置
                        this.tooltipPos = {
                            top: top,
                            left: left,
                            opacity: 1
                        };
                    });

                    // 新增：监听图表点击事件（仅在cursor模式下生效）
                    this.chart.subscribeClick((param) => {
                        if (this.activeTool === 'cursor' && param.point) {
                            // 将点击位置的价格填充到输入框
                            const price = this.candleSeries.coordinateToPrice(param.point.y);
                            if (price) {
                                this.newPriceLine.price = price.toFixed(1); // 保留1位小数
                                navigator.clipboard.writeText(this.newPriceLine.price);
                                if (!this.isSim) {
                                    this.simEntryPrice = price.toFixed(1); // 保留1位小数
                                }
                            }
                        }
                    });
                },

                /**
                 * 加载指定日期范围的K线数据
                 */
                async loadKlineByDateRange(targetTime, direction) {
                    this.isLoading = true;
                    this.operateMsg = '';
                    try {
                        // 移动开始时间
                        if (targetTime === -1) {
                            if (this.interval === '1m') {
                                this.startTime = new Date(new Date(Date.parse(this.startTime) + direction * 1 * 60 * 1000).getTime() - new Date().getTimezoneOffset() * 60 * 1000).toISOString().slice(0, 16);
                            } else if (this.interval === '5m') {
                                this.startTime = new Date(new Date(Date.parse(this.startTime) + direction * 5 * 60 * 1000).getTime() - new Date().getTimezoneOffset() * 60 * 1000).toISOString().slice(0, 16);
                            } else if (this.interval === '30m') {
                                this.startTime = new Date(new Date(Date.parse(this.startTime) + direction * 30 * 60 * 1000).getTime() - new Date().getTimezoneOffset() * 60 * 1000).toISOString().slice(0, 16);
                            } else if (this.interval === '1h') {
                                this.startTime = new Date(new Date(Date.parse(this.startTime) + direction * 60 * 60 * 1000).getTime() - new Date().getTimezoneOffset() * 60 * 1000).toISOString().slice(0, 16);
                            }
                        }
                        // 移动结束时间
                        else if (targetTime === 1) {
                            if (this.interval === '1m') {
                                this.endTime = new Date(new Date(Date.parse(this.endTime) + direction * 1 * 60 * 1000).getTime() - new Date().getTimezoneOffset() * 60 * 1000).toISOString().slice(0, 16);
                            } else if (this.interval === '5m') {
                                this.endTime = new Date(new Date(Date.parse(this.endTime) + direction * 5 * 60 * 1000).getTime() - new Date().getTimezoneOffset() * 60 * 1000).toISOString().slice(0, 16);
                            } else if (this.interval === '30m') {
                                this.endTime = new Date(new Date(Date.parse(this.endTime) + direction * 30 * 60 * 1000).getTime() - new Date().getTimezoneOffset() * 60 * 1000).toISOString().slice(0, 16);
                            } else if (this.interval === '1h') {
                                this.endTime = new Date(new Date(Date.parse(this.endTime) + direction * 60 * 60 * 1000).getTime() - new Date().getTimezoneOffset() * 60 * 1000).toISOString().slice(0, 16);
                            }
                        }

                        // 调用后台接口
                        const response = await fetch(`${this.apiBaseUrl}/c/binance/kline_range?s=${this.symbol}&i=${this.interval}&start=${this.startTime}&end=${this.endTime}&force=false&location=${this.location}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json',
                            },
                        });

                        if (!response.ok) {
                            const errorText = await response.text();
                            throw new Error(errorText || `请求失败：${response.status}`);
                        }

                        const result = await response.json();
                        this.currentKlineData = result.data || [];
                        this.currentStep = this.targetStep;

                        // 转换数据格式并渲染图表
                        const chartData = this.currentKlineData.map(item => ({
                            time: Math.floor(item["openTime"] / 1000), // 转换为秒级时间戳
                            open: parseFloat(item["openPrice"]),
                            high: parseFloat(item["highPrice"]),
                            low: parseFloat(item["lowPrice"]),
                            close: parseFloat(item["closePrice"])
                        }));
                        this.candleSeries.setData(chartData);
                        const ema20Data = this.calculateEMA(chartData, 20);
                        this.ema20Series.setData(ema20Data);
                        this.chart.timeScale().fitContent();
                        this.restorePriceLines(this.priceLinesData); // ✅ 恢复价格线
                        this.showOperateMsg(`成功加载${this.targetStep}根K线`, true);
                    } catch (error) {
                        console.error('加载K线失败：', error);
                        this.showOperateMsg(`加载失败：${error.message}`, false);
                    } finally {
                        this.isLoading = false;
                    }
                },

                async reDownloadKlineByDateRange() {
                    this.isLoading = true;
                    this.operateMsg = '';
                    try {
                        // 调用后台接口
                        const response = await fetch(`${this.apiBaseUrl}/c/binance/kline_range?s=${this.symbol}&i=${this.interval}&start=${this.startTime}&end=${this.endTime}&force=true&location=${this.location}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json',
                            },
                        });

                        if (!response.ok) {
                            const errorText = await response.text();
                            throw new Error(errorText || `请求失败：${response.status}`);
                        }

                        const result = await response.json();
                        this.currentKlineData = result.data || [];
                        this.currentStep = this.targetStep;

                        // 转换数据格式并渲染图表
                        const chartData = this.currentKlineData.map(item => ({
                            time: Math.floor(item["openTime"] / 1000), // 转换为秒级时间戳
                            open: parseFloat(item["openPrice"]),
                            high: parseFloat(item["highPrice"]),
                            low: parseFloat(item["lowPrice"]),
                            close: parseFloat(item["closePrice"])
                        }));
                        this.candleSeries.setData(chartData);
                        const ema20Data = this.calculateEMA(chartData, 20);
                        this.ema20Series.setData(ema20Data);
                        this.chart.timeScale().fitContent();
                        this.restorePriceLines(this.priceLinesData); // ✅ 恢复价格线
                        this.showOperateMsg(`成功加载${this.targetStep}根K线`, true);
                    } catch (error) {
                        console.error('加载K线失败：', error);
                        this.showOperateMsg(`加载失败：${error.message}`, false);
                    } finally {
                        this.isLoading = false;
                    }
                },

                /**
                 * 重置回放
                 */
                resetPlayback() {
                    this.currentStep = 0;
                    this.targetStep = 1;
                    this.currentKlineData = [];
                    this.operateMsg = '';
                    this.candleSeries.setData([]);
                    this.ema20Series.setData([]);
                    this.currentKline = null;
                    this.tooltipPos.opacity = 0;
                    // 清空所有绘图元素
                    this.trendLines = [];
                    this.rects = [];
                    this.rrTools = [];
                    this.overlayTempPoint = null;
                    this.rectTemp = null;
                    this.rrTemp = null;
                    this.renderOverlay();
                },

                /**
                 * 显示操作提示信息
                 */
                showOperateMsg(msg, isSuccess) {
                    this.operateMsg = msg;
                    this.operateSuccess = isSuccess;
                    // 5秒后自动清除提示
                    setTimeout(() => {
                        this.operateMsg = '';
                    }, 5000);
                },

                /**
                 * 格式化时间戳
                 */
                formatTimestamp(timestamp) {
                    if (!timestamp) return '';
                    // 兼容毫秒/秒级时间戳
                    const date = new Date(timestamp.toString().length > 10 ? timestamp : (timestamp * 1000));
                    return new Intl.DateTimeFormat('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    }).format(date);
                },

                /**
                 * 处理窗口大小变化
                 */
                handleWindowResize() {
                    if (!this.chart || !this.$refs.chartEl) return;
                    this.chart.applyOptions({height: this.$refs.chartEl.clientHeight});
                    if (this.currentKlineData.length > 0) this.chart.timeScale().fitContent();
                }
            }
        }).mount('#app');
    </script>
</body>

</html>
