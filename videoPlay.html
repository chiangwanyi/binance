<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>摄像头录像测试</title>
    <style>
        body { max-width: 900px; margin: 30px auto; font-size: 16px; }
        .form-box { margin-bottom: 20px; }
        input { padding: 8px; width: 280px; margin-right: 10px; }
        button { padding: 8px 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .video-box { margin-top: 20px; }
        video { width: 100%; border: 1px solid #ccc; }
    </style>
</head>
<body>
<h2>大华摄像头录像下载/播放</h2>

<div class="form-box">
    <input type="text" id="startTime" value="2026-03-13 10:00:00" placeholder="开始时间：YYYY-MM-DD HH:mm:ss">
    <input type="number" id="duration" value="60" placeholder="时长（秒）">
    <!--  ChannelId  -->
    <input type="number" id="channelId" value="0" placeholder="通道ID">
    <button onclick="playVideo()">播放视频</button>
    <button onclick="downloadVideo()">下载视频</button>
</div>

<div class="video-box">
    <video id="videoPlayer" controls></video>
</div>

<script>
    // 后端接口地址
    const baseUrl = "http://localhost:8765/camera/download";

    // 播放视频
    function playVideo() {
        const startTime = document.getElementById("startTime").value;
        const duration = document.getElementById("duration").value;
        const channelId = document.getElementById("channelId").value;

        const url = `${baseUrl}?start=${encodeURIComponent(startTime)}&duration=${duration}&channelId=${channelId}`;
        document.getElementById("videoPlayer").src = url;
    }

    // 下载视频
    function downloadVideo() {
        const startTime = document.getElementById("startTime").value;
        const duration = document.getElementById("duration").value;
        const channelId = document.getElementById("channelId").value;

        const url = `${baseUrl}?start=${encodeURIComponent(startTime)}&duration=${duration}&channelId=${channelId}`;
        const a = document.createElement("a");
        a.href = url;
        a.download = "";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
</body>
</html>
